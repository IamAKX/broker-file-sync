name: CI — Test & Build (main)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl xlrd pytest pytest-qt

      - name: Install virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxkbcommon-x11-0 \
            xvfb \
            x11-utils

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -v --tb=short

  compute-version:
    name: Compute Next Version
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.next.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semver (patch bump off the highest existing vX.Y.Z tag)
        id: next
        run: |
          latest=$(git tag -l 'v*.*.*' | sed 's/^v//' | sort -t. -k1,1n -k2,2n -k3,3n | tail -n1)
          if [ -z "$latest" ]; then
            next="0.1.0"
          else
            IFS=. read -r major minor patch <<< "$latest"
            next="$major.$minor.$((patch + 1))"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs:
      - test
      - compute-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl xlrd pyinstaller pywin32

      - name: Write app version
        shell: pwsh
        run: Set-Content -Path version.py -Value 'APP_VERSION = "${{ needs.compute-version.outputs.version }}"'

      - name: Build Windows
        shell: pwsh
        run: |
          pyinstaller --windowed --onedir --name "BrokerFileSync" `
            --icon "assets\icons\app_logo.ico" `
            --add-data "assets;assets" `
            --add-data "screens;screens" `
            --add-data "services;services" `
            --add-data "components;components" `
            --add-data "font_scale.py;." `
            --collect-data openpyxl `
            --collect-all win32com `
            --collect-all pythoncom `
            --hidden-import win32com `
            --hidden-import win32com.client `
            --hidden-import win32com.server `
            --hidden-import pythoncom `
            --hidden-import pywintypes `
            --hidden-import win32api `
            --hidden-import win32con `
            --manifest "windows_dpi.manifest" `
            main.py

      - name: Zip Windows Build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/BrokerFileSync/* `
            -DestinationPath dist/BrokerFileSync-windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrokerFileSync-windows
          path: dist/BrokerFileSync-windows.zip

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    needs:
      - test
      - compute-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl xlrd pyinstaller

      - name: Write app version
        run: echo 'APP_VERSION = "${{ needs.compute-version.outputs.version }}"' > version.py

      - name: Build macOS
        run: |
          pyinstaller \
            --windowed \
            --onedir \
            --name BrokerFileSync \
            --icon "assets/icons/app_logo.icns" \
            --add-data "assets:assets" \
            --add-data "screens:screens" \
            --add-data "services:services" \
            --add-data "components:components" \
            --add-data "font_scale.py:." \
            --collect-data openpyxl \
            main.py

      - name: Zip macOS Build
        run: |
          cd dist
          # pyinstaller --windowed produces the BrokerFileSync.app bundle
          # directly (no separate plain "BrokerFileSync" folder) — the
          # previous "zip -r BrokerFileSync-macos.zip BrokerFileSync" here
          # matched nothing.
          zip -r BrokerFileSync-macos.zip BrokerFileSync.app

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrokerFileSync-macos
          path: dist/BrokerFileSync-macos.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - compute-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: BrokerFileSync-windows
          path: artifacts

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: BrokerFileSync-macos
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum BrokerFileSync-windows.zip BrokerFileSync-macos.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.version }}
          name: v${{ needs.compute-version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/BrokerFileSync-windows.zip
            artifacts/BrokerFileSync-macos.zip
            artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}