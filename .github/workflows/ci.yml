name: CI — Test (main)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Run tests ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl xlrd pytest pytest-qt

      - name: Install virtual display (headless Qt)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgl1 libegl1 libglib2.0-0 libdbus-1-3 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxkbcommon-x11-0 \
            xvfb x11-utils

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -v --tb=short

  # ── 2. Only staging may merge into main ─────────────────────────────────────
  verify-source-branch:
    name: Verify Source Branch
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Require PR head to be staging
        run: |
          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "::error::Only the 'staging' branch may be merged into main (got '${{ github.head_ref }}')."
            exit 1
          fi
