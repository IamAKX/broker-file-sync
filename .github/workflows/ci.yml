name: CI — Test & Build (main)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl xlrd pytest pytest-qt

      - name: Install virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxkbcommon-x11-0 \
            xvfb \
            x11-utils

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -v --tb=short

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl xlrd pyinstaller pywin32

      - name: Build Windows
        shell: pwsh
        run: |
          pyinstaller --windowed --onedir --name "BrokerFileSync" `
            --add-data "assets;assets" `
            --add-data "screens;screens" `
            --add-data "services;services" `
            --add-data "components;components" `
            --add-data "font_scale.py;." `
            --collect-data openpyxl `
            --collect-all win32com `
            --collect-all pythoncom `
            --hidden-import win32com `
            --hidden-import win32com.client `
            --hidden-import win32com.server `
            --hidden-import pythoncom `
            --hidden-import pywintypes `
            --hidden-import win32api `
            --hidden-import win32con `
            --manifest "windows_dpi.manifest" `
            main.py

      - name: Zip Windows Build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/BrokerFileSync/* `
            -DestinationPath dist/BrokerFileSync-windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrokerFileSync-windows
          path: dist/BrokerFileSync-windows.zip

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl xlrd pyinstaller

      - name: Build macOS
        run: |
          pyinstaller \
            --windowed \
            --onedir \
            --name BrokerFileSync \
            --add-data "assets:assets" \
            --add-data "screens:screens" \
            --add-data "services:services" \
            --add-data "components:components" \
            --add-data "font_scale.py:." \
            --collect-data openpyxl \
            main.py

      - name: Zip macOS Build
        run: |
          cd dist
          zip -r BrokerFileSync-macos.zip BrokerFileSync

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrokerFileSync-macos
          path: dist/BrokerFileSync-macos.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: BrokerFileSync-windows
          path: artifacts

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: BrokerFileSync-macos
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          generate_release_notes: true
          files: |
            artifacts/BrokerFileSync-windows.zip
            artifacts/BrokerFileSync-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}