name: CI — Test & Build (staging)

on:
  push:
    branches: [staging]

jobs:
  # ── 1. Run tests ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl xlrd pytest pytest-qt

      - name: Install virtual display (headless Qt)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgl1 libegl1 libglib2.0-0 libdbus-1-3 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxkbcommon-x11-0 \
            xvfb x11-utils

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -v --tb=short

  # ── 2. Build Windows .exe ───────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl xlrd pyinstaller pywin32

      - name: Build Windows .exe
        run: |
          pyinstaller --windowed --onedir --name "BrokerFileSync" `
            --add-data "assets;assets" `
            --add-data "screens;screens" `
            --add-data "services;services" `
            --add-data "components;components" `
            --add-data "font_scale.py;." `
            --collect-data openpyxl `
            --collect-all win32com `
            --collect-all pythoncom `
            --hidden-import win32com `
            --hidden-import win32com.client `
            --hidden-import win32com.server `
            --hidden-import pythoncom `
            --hidden-import pywintypes `
            --hidden-import win32api `
            --hidden-import win32con `
            --manifest "windows_dpi.manifest" `
            main.py

      - name: Zip Windows build
        run: |
          cd dist
          Compress-Archive -Path BrokerFileSync -DestinationPath BrokerFileSync-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrokerFileSync-windows
          path: dist/BrokerFileSync-windows.zip
          retention-days: 30
