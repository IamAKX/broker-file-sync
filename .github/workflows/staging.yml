name: CI — Test (staging)

on:
  push:
    branches: [staging]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl xlrd pytest pytest-qt

      - name: Install virtual display (headless Qt)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgl1 libegl1 libglib2.0-0 libdbus-1-3 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxkbcommon-x11-0 \
            xvfb x11-utils

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -v --tb=short
